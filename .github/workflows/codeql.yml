name: "CodeQL"

on:
  push:
    分支: [ "main" ]
  pull_request:
    分支: [ "main" ]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  analyze-linux:
    name: Analyze (Linux)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build qt6-base-dev qt6-tools-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        build-mode: manual

    - name: Configure CMake (Linux)
      run: |
        rm -rf build
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_VERBOSE_MAKEFILE=ON

    - name: Build (Linux)
      run: |
        cd build
        cmake --build . --config Debug --verbose

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"

  analyze-windows:
    name: Analyze (Windows)
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install vcpkg (Windows)
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Install Qt via vcpkg (Windows)
      shell: pwsh
      run: |
        cd vcpkg
        .\vcpkg install qtbase qttools

    - name: Add vcpkg to PATH (Windows)
      shell: pwsh
      run: echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        build-mode: manual

    - name: Configure CMake (Windows)
      shell: pwsh
      run: |
        Remove-Item -Path build -Recurse -Force -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Path build | Out-Null
        cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -DCMAKE_BUILD_TYPE=Debug -DCMAKE_VERBOSE_MAKEFILE=ON

    - name: Build (Windows)
      shell: pwsh
      run: |
        cd build
        cmake --build . --config Debug --verbose

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"
