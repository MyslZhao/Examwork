name: "CodeQL"

on:
  push:
    分支: [ "main" ]
  pull_request:
    分支: [ "main" ]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  analyze-linux:
    name: Analyze (Linux)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build qt6-base-dev qt6-tools-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        build-mode: manual

    - name: Configure CMake (Linux)
      run: |
        rm -rf build
        cmake -S Markedit -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_VERBOSE_MAKEFILE=ON

    - name: Build (Linux)
      run: |
        cd build
        cmake --build . --config Debug --verbose

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"

  analyze-windows:
    name: Analyze (Windows)
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qtbase qttools' 
        
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        build-mode: manual

    - name: Configure CMake (Windows)
      shell: pwsh
      run: |
        Remove-Item -Path build -Recurse -Force -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Path build | Out-Null
        cd build
        cmake -S Markedit -B build -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -DCMAKE_BUILD_TYPE=Debug -DCMAKE_VERBOSE_MAKEFILE=ON

    - name: Build (Windows)
      shell: pwsh
      run: |
        cd build
        cmake --build . --config Debug --verbose

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"
