name: Qt CMake Build and Release

on:
  push:
    tags: [ 'v*' ]   # 推送 v1.0.0 格式的标签时触发

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
          - { name: "Linux",   os: ubuntu-22.04, qt-version: '6.5.0' }
          - { name: "Windows", os: windows-2022, qt-version: '6.5.0' }
          - { name: "macOS",   os: macos-12,     qt-version: '6.5.0' }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Qt（默认包含常用模块，如 Core, Widgets, Gui）
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ matrix.config.qt-version }}
          host: ${{ runner.os == 'Windows' && 'windows' || runner.os == 'macOS' && 'mac' || 'linux' }}
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2019_64' || '' }}  # Windows 下指定架构
          modules: 'qtcharts qtsvg'        # 可选：需要额外的 Qt 模块
          cache: true                       # 缓存 Qt 安装，加速后续构建

      # Linux 可能需要安装图形库依赖
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-xinerama0

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests (if any)
        run: ctest --test-dir build --output-on-failure
        
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --target package

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --target package --config Release
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ matrix.config.name }}
          path: |
            build/*.tar.gz
            build/*.deb
            build/*.dmg
            build/*.exe
            build/*.zip
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-*/*
          generate_release_notes: true
