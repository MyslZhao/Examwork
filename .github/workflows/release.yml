name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux:
    name: Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build qt6-base-dev qt6-tools-dev libgl1-mesa-dev

      - name: Configure CMake
        run: |
          cmake -S Markedit -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package .deb
        run: |
          cd build
          cpack -G DEB

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-linux-deb
          path: build/*.deb

  release-windows-x64:
    name: Windows x64 (MinGW)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Cache vcpkg (x64)
        id: cache-vcpkg-x64
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          key: vcpkg-${{ runner.os }}-x64-qtbase-qttools
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install Qt via vcpkg (x64)
        if: steps.cache-vcpkg-x64.outputs.cache-hit != 'true'
        run: |
          cd vcpkg
          .\vcpkg install qtbase qttools --triplet x64-windows

      - name: Add vcpkg to PATH
        run: echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -S Markedit -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -G "MinGW Makefiles"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        shell: msys2 {0}
        run: |
          cd build
          windeployqt --release Markedit.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-windows-x64
          path: build/

  release-windows-x86:
    name: Windows x86 (MinGW)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-ninja

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Cache vcpkg (x86)
        id: cache-vcpkg-x86
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          key: vcpkg-${{ runner.os }}-x86-qtbase-qttools
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install Qt via vcpkg (x86)
        if: steps.cache-vcpkg-x86.outputs.cache-hit != 'true'
        run: |
          cd vcpkg
          .\vcpkg install qtbase qttools --triplet x86-windows

      - name: Add vcpkg to PATH
        run: echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -S Markedit -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -G "MinGW Makefiles"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        shell: msys2 {0}
        run: |
          cd build
          windeployqt --release Markedit.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-windows-x86
          path: build/

  create-release:
    needs: [release-linux, release-windows-x64, release-windows-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine if prerelease
        id: check_prerelease
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == v0.* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
          files: |
            artifacts/Markedit-linux-deb/*.deb
            artifacts/Markedit-windows-x64/*
            artifacts/Markedit-windows-x86/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}