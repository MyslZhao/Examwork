name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux:
    name: Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build qt6-base-dev qt6-tools-dev libgl1-mesa-dev

      - name: Configure CMake
        run: |
          cmake -S Markedit -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package .deb
        run: |
          cd build
          # 确保 CMakeLists.txt 已配置 CPack（见下文说明）
          cpack -G DEB

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-linux-deb
          path: build/*.deb

  release-windows-x64:
    name: Windows x64 (MinGW)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtbase qttools'
          dir: '${{ github.workspace }}/Qt'

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -S Markedit -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            -G "MinGW Makefiles"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        shell: msys2 {0}
        run: |
          cd build
          windeployqt --release Markedit.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-windows-x64
          path: build/

  release-windows-x86:
    name: Windows x86 (MinGW)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 (MINGW32)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-ninja

      - name: Install Qt (win32_mingw)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win32_mingw'
          modules: 'qtbase qttools'
          dir: '${{ github.workspace }}/Qt'

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -S Markedit -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            -G "MinGW Makefiles"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        shell: msys2 {0}
        run: |
          cd build
          windeployqt --release Markedit.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-windows-x86
          path: build/

  create-release:
    needs: [release-linux, release-windows-x64, release-windows-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine if prerelease
        id: check_prerelease
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == v0.* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Markedit-linux-deb/*.deb
            artifacts/Markedit-windows-x64/*
            artifacts/Markedit-windows-x86/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}