name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux:
    name: Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build qt6-base-dev qt6-tools-dev libgl1-mesa-dev

      - name: Configure CMake
        run: |
          cmake -S Markedit -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package .deb
        run: |
          cd build
          cpack -G DEB

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-linux-deb
          path: build/*.deb

  release-windows-x64:
    name: Windows x64 (MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Cache vcpkg (x64)
        id: cache-vcpkg-x64
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          key: vcpkg-${{ runner.os }}-x64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-x64-
            vcpkg-${{ runner.os }}-

      - name: Install dependencies (x64)
        if: steps.cache-vcpkg-x64.outputs.cache-hit != 'true'
        run: |
          .\vcpkg\vcpkg install --triplet x64-windows

      - name: Add vcpkg to PATH
        run: echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake (x64)
        run: |
          Remove-Item -Path build -Recurse -Force -ErrorAction SilentlyContinue
          cmake -S Markedit -B build `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DQt6_DIR="${{ github.workspace }}\vcpkg\installed\x64-windows\share\qt6" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_VERBOSE_MAKEFILE=ON `
            -G "Visual Studio 17 2022" -A x64

      - name: Build (x64)
        run: |
          cd build
          cmake --build . --config Release --verbose

      - name: Deploy Qt dependencies (x64)
        run: |
          # 使用 vcpkg 安装的 windeployqt（路径固定）
          & "${{ github.workspace }}\vcpkg\installed\x64-windows\tools\qt6\bin\windeployqt.exe" --release build\Release\Markedit.exe

      - name: Upload artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-windows-x64
          path: build\Release\

  release-windows-x86:
    name: Windows x86 (MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Cache vcpkg (x86)
        id: cache-vcpkg-x86
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          key: vcpkg-${{ runner.os }}-x86-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-x86-
            vcpkg-${{ runner.os }}-

      - name: Install dependencies if cache miss
        if: steps.cache-vcpkg-x86.outputs.cache-hit != 'true'
        run: .\vcpkg\vcpkg install --triplet x86-windows

      - name: Verify Qt6 installation (x86)
        run: |
          $installDir = "${{ github.workspace }}\vcpkg\installed\x86-windows"
          $shareDir = "$installDir\share"
          if (-not (Test-Path $shareDir)) {
            Write-Host "Qt share directory not found. Forcing reinstall..."
            .\vcpkg\vcpkg install --triplet x86-windows --recurse
          }
          $qt6Config = Get-ChildItem -Path $shareDir -Recurse -Filter "Qt6Config.cmake" -ErrorAction Stop | Select-Object -First 1
          $qt6Dir = $qt6Config.DirectoryName
          Write-Host "Found Qt6Config.cmake in $qt6Dir"
          echo "Qt6_DIR=$qt6Dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Add vcpkg to PATH
        run: echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake (x86)
        run: |
          Remove-Item -Path build -Recurse -Force -ErrorAction SilentlyContinue
          cmake -S Markedit -B build `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DQt6_DIR="${{ env.Qt6_DIR }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_VERBOSE_MAKEFILE=ON `
            -G "Visual Studio 17 2022" -A Win32

      - name: Build (x86)
        run: |
          cd build
          cmake --build . --config Release --verbose

      - name: Deploy Qt dependencies (x86)
        run: |
          & "${{ github.workspace }}\vcpkg\installed\x86-windows\tools\qt6\bin\windeployqt.exe" --release build\Release\Markedit.exe

      - name: Upload artifact (x86)
        uses: actions/upload-artifact@v4
        with:
          name: Markedit-windows-x86
          path: build\Release\

  create-release:
    needs: [release-linux, release-windows-x64, release-windows-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine if prerelease
        id: check_prerelease
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == v0.* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
          files: |
            artifacts/Markedit-linux-deb/*.deb
            artifacts/Markedit-windows-x64/*
            artifacts/Markedit-windows-x86/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}